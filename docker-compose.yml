version: '3.8'

services:
  bot:
    build: .
    container_name: vpn_telegram_bot
    restart: always
    environment:
      - DB_PATH=/app/data/database.db
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-8000}:${WEB_PORT:-8000}"
    volumes:
      # Монтируем локальную папку ./data в контейнер для персистентности SQLite
      - ./data:/app/data

  db_backup:
    image: alpine:latest
    container_name: vpn_db_backup
    restart: always
    volumes:
      # Бэкап-контейнер имеет доступ к рабочей БД и к папке сохранения бэкапов
      - ./data:/data
      - ./backups:/backups
    entrypoint: >
      sh -c "
      apk add --no-cache sqlite;
      while true; do
        echo \"[$(date)] Запуск резервного копирования SQLite... \";
        sqlite3 /data/database.db \".backup /backups/backup_auto_$$(date +%Y%m%d_%H%M%S).db\";
        # Удаление бэкапов старше 14 дней
        find /backups -name 'backup_auto_*.db' -mtime +14 -delete;
        echo \"[$(date)] Резервное копирование завершено. Следующий запуск через 24 часа.\";
        sleep 86400;
      done
      "